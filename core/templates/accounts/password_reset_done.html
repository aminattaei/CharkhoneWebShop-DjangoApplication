{% extends 'website/base.html' %}

{% block title %}
ارسال ایمیل بازیابی
{% endblock title %}

{% block content %}
<!-- Form -->
<div class="container content-space-3 content-space-t-lg-4 content-space-b-lg-3">
    <div class="flex-grow-1 mx-auto" style="max-width: 28rem;">
        <!-- Heading -->
        <div class="text-center mb-5 mb-md-7">
            <h1 class="h2">ایمیل ارسال شد</h1>
            <p>اگر حساب کاربری با این ایمیل وجود داشته باشد، لینک بازیابی رمز عبور برایتان ارسال شده است.</p>
            <p>لطفاً ایمیل خود را بررسی کنید.</p>
        </div>
        <!-- End Heading -->

        <div class="d-grid mb-3">
            <a class="btn btn-primary btn-lg" href="{% url 'accounts:login' %}">بازگشت به صفحه ورود</a>
        </div>
    </div>
</div>
<!-- End Form -->
{% endblock content %}
