<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازیابی رمز عبور</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; margin-bottom: 24px; color: #333; }
        label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #4a90d9; }
        button { width: 100%; padding: 12px; background: #4a90d9; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #357abd; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .message { text-align: center; margin-top: 16px; padding: 10px; border-radius: 8px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="card">
        <h2>بازیابی رمز عبور</h2>
        <form id="resetForm">
            <label for="new_password">رمز عبور جدید</label>
            <input type="password" id="new_password" name="new_password" placeholder="حداقل ۸ کاراکتر" required minlength="8">
            <button type="submit" id="submitBtn">تغییر رمز</button>
        </form>
        <div id="msg"></div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        if (!token) {
            document.getElementById('msg').innerHTML = '<div class="message error">توکن یافت نشد.</div>';
            document.getElementById('submitBtn').disabled = true;
        }
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'در حال پردازش...';
            try {
                const response = await fetch('/accounts/api/reset-password/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token,
                        new_password: document.getElementById('new_password').value
                    })
                });
                const data = await response.json();
                const msgDiv = document.getElementById('msg');
                if (response.ok) {
                    msgDiv.innerHTML = '<div class="message success">' + data.detail + '</div>';
                    document.getElementById('resetForm').reset();
                } else {
                    msgDiv.innerHTML = '<div class="message error">' + (data.detail || data.new_password || 'خطایی رخ داد.') + '</div>';
                    btn.disabled = false;
                    btn.textContent = 'تغییر رمز';
                }
            } catch (err) {
                document.getElementById('msg').innerHTML = '<div class="message error">خطا در اتصال به سرور.</div>';
                btn.disabled = false;
                btn.textContent = 'تغییر رمز';
            }
        });
    </script>
</body>
</html>
